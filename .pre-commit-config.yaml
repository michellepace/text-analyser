repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.17
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      # Run the linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter  
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
